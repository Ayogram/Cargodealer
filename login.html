<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login – CargoDealerInc</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      background-color: #111827 !important; /* Solid dark background matching screenshot perfectly */
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 15px; /* Start from top to prevent flex cutoff */
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }
    .brand-logo-container {
      background: #ffffff;
      width: 85px;
      height: 85px;
      min-width: 85px;
      min-height: 85px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%; /* Perfect circle */
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .brand-logo-container img {
      height: 55px; /* Slightly smaller to fit circle perfectly */
      display: block;
      mix-blend-mode: multiply; /* Seamless blend over white circle */
    }
    .auth-container { 
      width: 100%; 
      max-width: 440px; 
      padding: 30px 40px; 
      background: #ffffff; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      box-sizing: border-box; 
    }
    .auth-container h2 { 
      margin-top: 0; 
      margin-bottom: 20px; 
      text-align: center; 
      color: #1a202c; 
      font-size: 22px; 
      font-weight: 700;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #4a5568; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #3182ce; outline: none; }
    .error-msg { color: #d32f2f; font-size: 13px; margin-bottom: 14px; display: none; }
    .link-text { text-align: center; margin-top: 20px; font-size: 14px; color: #718096; }
    .link-text a { color: #2b6cb0; font-weight: bold; text-decoration: none; }
    .link-text a:hover { text-decoration: underline; }
    .btn-submit { background: #1f7a39; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
    .btn-submit:hover { background: #165c2b; }
    .social-btn { width:100%; background:#fff; color:#4a5568; border:1px solid #cbd5e0; display:flex; align-items:center; justify-content:center; gap:10px; font-weight:600; cursor:pointer; padding: 8px; border-radius: 6px; font-size: 13px; transition: background 0.2s; margin-bottom: 8px;}
    .social-btn:hover { background: #f7fafc; }
    
    .terms-check { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 13px; color: #718096; }
    .terms-check input { width: auto; margin:0; }
    
    .password-wrapper { position: relative; display: flex; align-items: center; }
    .password-wrapper input { padding-right: 40px; }
    .toggle-password { position: absolute; right: 12px; cursor: pointer; color: #a0aec0; display: flex; }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>



  <div class="brand-logo-container">
    <a href="index.html">
      <img src="assets/images/logo.png" alt="CargoDealer Logo">
    </a>
  </div>

  <div class="auth-container">
    <div id="errorMsg" class="error-msg" style="display:none; color:#d32f2f; background:#fee2e2; padding:10px; border-radius:4px; margin-bottom:15px; font-size:14px; text-align:center;"></div>
    <div id="successMsg" class="success-msg" style="display:none; color:#2e7d32; background:#e8f5e9; padding:10px; border-radius:4px; margin-bottom:15px; font-size:14px; text-align:center;"></div>

    <div id="capsWarning" style="display: none; color: #d32f2f; font-size: 13px; font-weight: bold; margin-bottom: 10px; padding: 8px; background: #fee2e2; border-radius: 4px; text-align: center;">
      ⚠️ Caps Lock is ON
    </div>

    <form id="loginForm">
      <div id="loginFields">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required onkeyup="checkCapsLock(event)">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter password" required onkeyup="checkCapsLock(event)">
            <span class="toggle-password" onclick="togglePasswordVisibility('password', 'eyeIcon')">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
          </div>
        </div>
      </div>

      <div id="otpFields" style="display:none;">
        <p style="color:#4a5568; font-size:14px; margin-bottom:15px; text-align:center;">
          A 6-digit verification code has been sent to your email. Please enter it below to continue.
        </p>
        <label for="otp">Verification Code</label>
        <input type="text" id="otp" name="otp" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:8px; font-size:20px; font-weight:bold;">
      </div>
      
      <div class="terms-check" id="rememberBox">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe" style="margin:0; font-weight:normal;">Remember Me?</label>
      </div>

      <button type="submit" class="btn-submit" id="loginFormBtn">Sign In</button>
    </form>
    
    <div style="text-align: center; margin: 25px 0; color: #a0aec0; font-size: 14px; position:relative;">
      <hr style="border:none; border-top:1px solid #e2e8f0; position:absolute; top:7px; width:100%; z-index:1;">
      <span style="background:#fff; padding:0 10px; position:relative; z-index:2;">or</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <!-- Real Google Sign-In Button Container (Required for the real popup action) -->
      <div id="googleBtnContainer" style="width: 100%; min-height: 40px;"></div>
      
      <button type="button" class="social-btn" onclick="simLogin(this, event, 'Yahoo')">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.46 3L13.8 14.63v6.37H10.2v-6.37L1.54 3h4.31l5.95 8.44L18.15 3h4.31z" fill="#6001d2"/></svg>
        Continue with Yahoo Mail
      </button>
      <button type="button" class="social-btn" onclick="focusEmail()" style="margin-bottom:0;">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        Continue with Email
      </button>
    </div>
    
    <div class="link-text">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Global Error Monitoring
    window.onerror = function(msg, url, line) {
      const errorMsg = document.getElementById('errorMsg');
      if (errorMsg) {
        errorMsg.innerHTML = `<strong>Frontend Error:</strong> ${msg} (Line: ${line})`;
        errorMsg.style.display = 'block';
      }
      return false;
    };

    // Social simulation helpers
    async function simLogin(element, event, provider) {
      if (event) event.preventDefault();
      const btn = element;
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span class="spinner" style="border: 2px solid #cbd5e0; border-top: 2px solid #1f7a39; border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite; display: inline-block;"></span> Connecting to ${provider}...`;
      btn.disabled = true;

      // Simulate network delay
      await new Promise(resolve => setTimeout(resolve, 2000));

      document.getElementById('successMsg').innerHTML = `
        <div style="font-weight:bold; margin-bottom:5px;">${provider} Login Handshake Successful!</div>
        <div style="font-size:12px;">Authentication token received. Identity verified via OIDC.</div>
      `;
      document.getElementById('successMsg').style.display = 'block';
      
      btn.innerHTML = originalText;
      btn.disabled = false;
      
      // Success Redirect
      window.location.href = `success-sim.html?provider=${provider}`;
    }
    
    function focusEmail() {
      const emailInput = document.getElementById('email');
      emailInput.focus();
      emailInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
      // Visual feedback
      emailInput.style.outline = '2px solid #1f7a39';
      setTimeout(() => emailInput.style.outline = 'none', 1500);
    }

    // Password Visibility Toggle Logic
    function togglePasswordVisibility(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    // Caps Lock Warning Logic
    function checkCapsLock(event) {
      const warningElement = document.getElementById('capsWarning');
      if (event.getModifierState && event.getModifierState('CapsLock')) {
        warningElement.style.display = 'block';
      } else {
        warningElement.style.display = 'none';
      }
    }

    // Login Handling
    let requiresOtp = false;

    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const otp = document.getElementById('otp').value;
      const rememberCheck = document.getElementById('rememberMe');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        let response;
        if (!requiresOtp) {
          // Stage 1: Initial Login
          response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
        } else {
          // Stage 2: OTP Verification
          response = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
          });
        }

        const data = await response.json();

        if (!response.ok) {
          errorMsg.textContent = data.msg || 'Login failed';
          errorMsg.style.display = 'block';
          return;
        }

        if (data.requiresOtp) {
          // Switch to OTP view
          requiresOtp = true;
          document.getElementById('loginFields').style.display = 'none';
          document.getElementById('rememberBox').style.display = 'none';
          document.getElementById('otpFields').style.display = 'block';
          document.getElementById('loginFormBtn').textContent = 'Verify & Sign In';
          successMsg.textContent = data.msg;
          successMsg.style.display = 'block';
          return;
        }

        // Success: Store Token
        localStorage.setItem('cargodealer_token', data.token);
        localStorage.setItem('cargodealer_user', JSON.stringify(data.user));

        if (rememberCheck && rememberCheck.checked) {
          localStorage.setItem('cargodealer_remembered_email', email);
        } else {
          localStorage.removeItem('cargodealer_remembered_email');
        }

        // Redirect based on role
        if (data.user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'dashboard.html';
        }

      } catch (err) {
        errorMsg.innerHTML = `
          <strong>Connectivity issue detected.</strong><br>
          <div style="margin-top:5px; font-size:12px;">
            1. Ensure the server is running: <code>node api/index.js</code><br>
            2. If MongoDB is off, use <b>Mock Mode</b> for testing:<br>
               Email: <code>test@example.com</code> | Pass: <code>password</code>
          </div>
        `;
        errorMsg.style.display = 'block';
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      // 1. PROTOCOL GUARD: Check if opening as file://
      if (window.location.protocol === 'file:') {
        const guard = document.createElement('div');
        guard.style = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(17,24,39,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px;';
        guard.innerHTML = `
          <div style="max-width:500px; background:#1e293b; padding:40px; border-radius:15px; border:2px solid #ef4444;">
            <h1 style="color:#ef4444; margin-top:0;">⚠️ Server Connection Required</h1>
            <p>You are viewing this page as a local file (file://). To make logins and the database work, you must view it through the local server.</p>
            <div style="background:#0f172a; padding:15px; border-radius:8px; margin:20px 0; text-align:left;">
              1. Open terminal in project folder<br>
              2. Run: <code>node api/index.js</code><br>
              3. Go to: <a href="http://localhost:5000/login.html" style="color:#10b981; font-weight:bold;">http://localhost:5000/login.html</a>
            </div>
            <p style="font-size:12px; color:#cbd5e0;">Logins will always fail if you double-click the HTML file in your folder.</p>
          </div>
        `;
        document.body.appendChild(guard);
        return;
      }

      // 2. LOAD STORED DATA
      const savedEmail = localStorage.getItem('cargodealer_remembered_email');
      const emailInput = document.getElementById('email');
      const rememberCheck = document.getElementById('rememberMe');
      
      if(savedEmail && emailInput) {
        emailInput.value = savedEmail;
        if(rememberCheck) rememberCheck.checked = true;
      }

      // 3. INITIALIZE REAL GOOGLE SIGN-IN
      const clientId = "506898969583-f24k6jld869iq6hv303jqt3rk58le9f0.apps.googleusercontent.com";
      if (typeof google !== 'undefined') {
        google.accounts.id.initialize({
          client_id: clientId, 
          callback: handleGoogleResponse
        });
        
        // Render the REAL button (This is the only way to get the Gmail-style popup)
        google.accounts.id.renderButton(
          document.getElementById("googleBtnContainer"),
          { 
            theme: "outline", 
            size: "large", 
            width: 320, 
            text: "signin_with",
            shape: "rectangular",
            logo_alignment: "left"
          }
        );
      }
    });

    // Google Action Check
    function startGoogleLogin() {
      const clientId = "506898969583-f24k6jld869iq6hv303jqt3rk58le9f0.apps.googleusercontent.com";
      if (!clientId || clientId.includes("PLACEHOLDER")) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerHTML = `
          <strong>Action Required: Google Setup Needed</strong><br>
          <div style="font-size:12px; margin-top:5px; text-align:left; line-height:1.4;">
            1. Go to your <code>.env</code> file.<br>
            2. Replace <code>YOUR_GOOGLE_CLIENT_ID_PLACEHOLDER</code> with your real ID from Google Cloud Console.<br>
            3. Restart the server (run <code>node api/index.js</code>).
          </div>
        `;
        errorMsg.style.display = 'block';
        return;
      }

      try {
        if (typeof google !== 'undefined') {
          google.accounts.id.prompt(); 
        } else {
          throw new Error("Google Identity SDK not loaded. Check internet connection.");
        }
      } catch (err) {
        alert(err.message);
      }
    }

    // Real Google Auth Callback
    async function handleGoogleResponse(response) {
      const errorMsg = document.getElementById('errorMsg');
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.msg || 'Google login failed');
        
        localStorage.setItem('cargodealer_token', data.token);
        localStorage.setItem('cargodealer_user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
