<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard – CargoDealerInc</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    body { background-color: #f8fafc; }
    .admin-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #fff; border-bottom: 1px solid var(--line); }
    .admin-nav .brand img { height: 32px; }
    .btn-logout { background: transparent; border: 1px solid var(--p1); color: var(--p1); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 12px; border: 1px solid var(--line); }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--line); }
    th { background-color: #f1f5f9; font-weight: 600; font-size: 14px; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #e0f2fe; color: #0284c7; }
    .action-btn { background: var(--p1); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 5px; }
    .action-btn.secondary { background: #64748b; }
    
    /* Modals */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 24px; border-radius: 8px; width: 400px; max-width: 90%; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-header h3 { margin: 0; }
    .close-btn { background: transparent; border: none; font-size: 20px; cursor: pointer; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="admin-nav">
    <a class="brand" href="../index.html">
      <img src="../assets/images/logo.png" alt="CargoDealer logo"/>
    </a>
    <div style="display:flex; align-items:center; gap:16px;">
      <span id="adminNameDisplay" style="font-weight:bold;">Admin</span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="dashboard-container">
    <div class="header-actions">
      <h2>Shipments Management</h2>
      <button class="btn primary" id="newShipmentBtn">+ New Shipment</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Tracking ID</th>
          <th>Service</th>
          <th>Route</th>
          <th>Status</th>
          <th>Last Updated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="shipmentsTableBody">
        <tr><td colspan="6" style="text-align:center;">Loading shipments...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Create Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create Shipment</h3>
        <button class="close-btn" id="closeCreateModal">&times;</button>
      </div>
      <form id="createForm">
        <div class="form-group">
          <label>Tracking ID (CDI-XXXXXX)</label>
          <input type="text" id="cTrackingId" required pattern="CDI-\d{6}" placeholder="CDI-123456" />
        </div>
        <div class="form-group">
          <label>Service Type</label>
          <select id="cService" required>
            <option value="Air Freight">Air Freight</option>
            <option value="Ocean Freight">Ocean Freight</option>
            <option value="Courier">Courier</option>
          </select>
        </div>
        <div class="form-group">
          <label>Route</label>
          <input type="text" id="cRoute" required placeholder="e.g. Lagos → Abuja" />
        </div>
        <div class="form-group">
          <label>Initial Staff Note</label>
          <textarea id="cNote" rows="2" placeholder="Shipment created..."></textarea>
        </div>
        <button type="submit" class="btn primary" style="width:100%">Create</button>
      </form>
    </div>
  </div>

  <!-- Update Modal -->
  <div class="modal-overlay" id="updateModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Update Shipment <span id="uTrackingIdDisplay"></span></h3>
        <button class="close-btn" id="closeUpdateModal">&times;</button>
      </div>
      <form id="updateForm">
        <input type="hidden" id="uTrackingId" />
        <div class="form-group">
          <label>Status</label>
          <select id="uCurrentIndex" required>
            <option value="0">Booking Confirmed</option>
            <option value="1">Pickup Scheduled</option>
            <option value="2">Picked Up</option>
            <option value="3">In Transit</option>
            <option value="4">Arrived at Destination Hub</option>
            <option value="5">Delivered</option>
          </select>
        </div>
        <div class="form-group">
          <label>Staff Note Update</label>
          <textarea id="uNote" rows="3" required placeholder="Add new note about location..."></textarea>
        </div>
        <button type="submit" class="btn primary" style="width:100%">Update Status</button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
