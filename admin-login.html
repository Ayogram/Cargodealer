<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Access – CargoDealerInc</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      background-color: #0f172a !important; /* Slightly darker indigo-black for admin */
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 15px;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
    }
    .brand-logo-container {
      background: #ffffff;
      width: 85px;
      height: 85px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .brand-logo-container img {
      height: 55px;
      mix-blend-mode: multiply;
    }
    .auth-container { 
      width: 100%; 
      max-width: 400px; 
      padding: 40px; 
      background: #ffffff; 
      border-radius: 12px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
    }
    .admin-badge {
      display: inline-block;
      background: #1e293b;
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #4a5568; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    .error-msg { color: #d32f2f; font-size: 13px; margin-bottom: 14px; display: none; padding: 10px; background: #fee2e2; border-radius: 4px; text-align: center; }
    .success-msg { color: #2e7d32; font-size: 13px; margin-bottom: 14px; display: none; padding: 10px; background: #e8f5e9; border-radius: 4px; text-align: center; }
    .btn-submit { background: #0f172a; color: #fff; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #1e293b; }
    .otp-input { letter-spacing: 10px; font-size: 24px; text-align: center; font-weight: 900; }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>

  <div class="brand-logo-container">
    <a href="index.html">
      <img src="assets/images/logo.png" alt="CargoDealer Logo">
    </a>
  </div>

  <div class="auth-container">
    <div style="text-align:center;"><span class="admin-badge">Secure Admin Gateway</span></div>
    <h2 style="text-align:center; margin-top:0; color:#1e293b;">Login Required</h2>
    
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="adminLoginForm">
      <div id="loginFields">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="email" placeholder="admin@cargodealer.inc" required>
        </div>
        <div class="form-group">
          <label>Master Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
      </div>

      <div id="otpFields" style="display:none;">
        <div class="form-group">
          <label style="text-align:center;">6-Digit Security Code</label>
          <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6">
        </div>
        <p style="font-size:12px; color:#718096; text-align:center;">Check your admin email for the code.</p>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Authenticate</button>
      
      <div style="text-align: center; margin: 20px 0; color: #a0aec0; font-size: 13px; position:relative;">
        <hr style="border:none; border-top:1px solid #e2e8f0; position:absolute; top:7px; width:100%; z-index:1;">
        <span style="background:#fff; padding:0 10px; position:relative; z-index:2;">or</span>
      </div>
      
      <div id="googleBtnContainer" style="width: 100%; display: flex; justify-content: center; margin-top: 10px;"></div>
    </form>
  </div>

  <script>
    // Global Error Monitoring
    window.onerror = function(msg, url, line) {
      const errorMsg = document.getElementById('errorMsg');
      if (errorMsg) {
        errorMsg.innerHTML = `<strong>Security Notice:</strong> ${msg}`;
        errorMsg.style.display = 'block';
      }
      return false;
    };

    // Protocol Guard logic below...
    document.addEventListener('DOMContentLoaded', () => {
      // 1. PROTOCOL GUARD
      if (window.location.protocol === 'file:') {
        const guard = document.createElement('div');
        guard.style = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.98); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; padding:20px;';
        guard.innerHTML = `
          <div style="max-width:500px; background:#1e293b; padding:40px; border-radius:15px; border:2px solid #ef4444;">
            <h1 style="color:#ef4444; margin-top:0;">🛑 Admin Security Restriction</h1>
            <p>Admin tools are only accessible via a secure local server connection.</p>
            <div style="background:#0f172a; padding:15px; border-radius:8px; margin:20px 0; text-align:left;">
              1. Run: <code>node api/index.js</code><br>
              2. Visit: <a href="http://localhost:5000/admin-login.html" style="color:#10b981; font-weight:bold;">http://localhost:5000/admin-login.html</a>
            </div>
          </div>
        `;
        document.body.appendChild(guard);
        return;
      }

      // 2. INITIALIZE REAL GOOGLE SIGN-IN (Background)
      const clientId = "506898969583-f24k6jld869iq6hv303jqt3rk58le9f0.apps.googleusercontent.com";
      if (typeof google !== 'undefined') {
        google.accounts.id.initialize({
          client_id: clientId, 
          callback: handleGoogleResponse
        });
        
        // Render the REAL button (This is the only way to get the Gmail-style popup)
        google.accounts.id.renderButton(
          document.getElementById("googleBtnContainer"),
          { 
            theme: "outline", 
            size: "large", 
            width: 320,
            text: "signin_with",
            shape: "rectangular",
            logo_alignment: "left"
          }
        );
      }
    });

    // Google Action Check for Admin
    function startGoogleLogin() {
      const clientId = "506898969583-f24k6jld869iq6hv303jqt3rk58le9f0.apps.googleusercontent.com";
      if (!clientId || clientId.includes("PLACEHOLDER")) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.innerHTML = `<strong>Action Required:</strong> Add your Google Client ID to <code>.env</code> to enable Admin Google Login.`;
        errorMsg.style.display = 'block';
        return;
      }
      if (typeof google !== 'undefined') {
        google.accounts.id.prompt(); 
      }
    }

    async function handleGoogleResponse(response) {
      const errorMsg = document.getElementById('errorMsg');
      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.msg || 'Google verification failed');
        
        // Ensure user is an admin
        if (data.user.role !== 'admin') {
          throw new Error('Access Denied: Your Google account is not authorized for Admin access.');
        }

        localStorage.setItem('cargodealer_token', data.token);
        localStorage.setItem('cargodealer_user', JSON.stringify(data.user));
        window.location.href = 'admin-dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
      }
    }

    let requiresOtp = false;

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const otp = document.getElementById('otp').value;
      const submitBtn = document.getElementById('submitBtn');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      try {
        let response;
        if (!requiresOtp) {
          response = await fetch('/api/auth/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
        } else {
          response = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
          });
        }

        const data = await response.json();

        if (!response.ok) {
          errorMsg.textContent = data.msg || 'Authentication failed.';
          errorMsg.style.display = 'block';
          return;
        }

        if (data.requiresOtp) {
          requiresOtp = true;
          document.getElementById('loginFields').style.display = 'none';
          document.getElementById('otpFields').style.display = 'block';
          submitBtn.textContent = 'Verify Security Code';
          successMsg.textContent = data.msg;
          successMsg.style.display = 'block';
          return;
        }

        // Success
        localStorage.setItem('cargodealer_token', data.token);
        localStorage.setItem('cargodealer_user', JSON.stringify(data.user));
        window.location.href = 'admin-dashboard.html';

      } catch (err) {
        errorMsg.innerHTML = `
          <strong>Admin Secure Service temporarily offline.</strong><br>
          <div style="margin-top:5px; font-size:12px;">
            1. Run <code>node api/index.js</code><br>
            2. For <b>Local Admin Testing (Mock Mode)</b>:<br>
               Email: <code>ajumobiayomipo@gmail.com</code> | Pass: <code>admin123</code>
          </div>
        `;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
